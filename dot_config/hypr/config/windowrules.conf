# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/0.45.0/Configuring/Window-Rules/ #

# Float Necessary Windows
windowrule {
  name = windowrule-1
  float = on
  match:class = ^(org.pulseaudio.pavucontrol)
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^()$
  match:title = ^(Picture in picture)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^()$
  match:title = ^(Save File)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = ^()$
  match:title = ^(Open File)$
}

windowrule {
  name = windowrule-5
  float = on
  match:class = ^(LibreWolf)$
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-6
  float = on
  match:class = ^(blueman-manager)$
}

windowrule {
  name = windowrule-7
  float = on
  match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
}

windowrule {
  name = windowrule-8
  float = on
  match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
}

windowrule {
  name = windowrule-9
  float = on
  match:class = ^(CachyOSHello)$
}

windowrule {
  name = windowrule-10
  float = on
  match:class = ^(zenity)$
}

windowrule {
  name = windowrule-11
  float = on
  match:class = ^()$
  match:title = ^(Steam - Self Updater)$
}

windowrule {
  name = windowrule-12
  float = on
  match:class = ^(steam)$
}

# Increase the opacity
windowrule {
  name = windowrule-13
  opacity = 0.92
  match:class = ^(thunar|nemo)$
}

windowrule {
  name = windowrule-14
  opacity = 0.96
  match:class = ^(discord|armcord|webcord)$
}

windowrule {
  name = windowrule-15
  opacity = 0.95
  match:title = ^(QQ|Telegram)$
}

windowrule {
  name = windowrule-16
  opacity = 0.95
  match:title = ^(NetEase Cloud Music Gtk4)$
}

# General window rules
windowrule {
  name = windowrule-17
  float = on
  size = 960 540
  move = ((monitor_w*0.25)-)
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = windowrule-18
  float = on
  move = ((monitor_w*0.25)-)
  size = 960 540
  match:title = ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
}

windowrule {
  name = windowrule-19
  pin = on
  match:title = ^(danmufloat)$
}

windowrule {
  name = windowrule-20
  rounding = 5
  match:title = ^(danmufloat|termfloat)$
}

windowrule {
  name = windowrule-21
  animation = slide right
  match:class = ^(kitty|Alacritty)$
}

windowrule {
  name = windowrule-22
  no_blur = on
  match:class = ^(org.mozilla.firefox)$
}

# Decorations related to floating windows on workspaces 1 to 10
windowrule {
  name = windowrule-23
  border_size = 2
  border_color = $cutecolor
  rounding = 8
  match:float = 1
  match:workspace = w[fv1-10]
}

# Decorations related to tiling windows on workspaces 1 to 10
windowrule {
  name = windowrule-24
  border_size = 3
  rounding = 4
  match:float = 0
  match:workspace = f[1-10]
}

# Windows Rules End #

# Workspaces Rules https://wiki.hyprland.org/0.45.0/Configuring/Workspace-Rules/ #
# workspace = 1, default:true, monitor:$priMon
# workspace = 6, default:true, monitor:$secMon
# Workspace selectors https://wiki.hyprland.org/0.45.0/Configuring/Workspace-Rules/#workspace-selectors
# workspace = r[1-5], monitor:$priMon
# workspace = r[6-10], monitor:$secMon
# workspace = special:scratchpad, on-created-empty:$applauncher
# no_gaps_when_only deprecated instead workspaces rules with selectors can do the same
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
  name = windowrule-25
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[tv1]
}

windowrule {
  name = windowrule-26
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = f[1]
}

# # Workspaces Rules End #

# Layers Rules #
layerrule {
  name = layerrule-1
  animation = slide top
  match:namespace = logout_dialog
}

# layerrule = animation popin 50%, waybar
layerrule {
  name = layerrule-2
  animation = slide down
  match:namespace = waybar
}

layerrule {
  name = layerrule-3
  animation = fade 50%
  match:namespace = wallpaper
}

# Layers Rules End #

# Per-app fixes #
# flameshot
windowrule {
  name = flameshot
  move = 0 0
  size = 1920 1080
  pin = on
  border_size = 0
  stay_focused = on
  opaque = on
  float = on
  monitor = 1
  # center = on
  # maximize = on
  match:class = (flameshot)
}


# Grayjay
windowrule {
  name = windowrule-28
  tile = on
  match:class = ^()$
  match:title = (Grayjay)
}


# iced
windowrule {
  name = windowrule-29
  float = on
  move = (20) (20)
  match:class = ^(?!discord).*
  match:title = .*(i|I)ced.*
}


windowrule {
  name = windowrule-30
  float = on
  move = ((monitor_w*1)-window_w-20) (20)
  match:title = ^comet$
}


# MANNager
windowrule {
  name = windowrule-31
  float = on
  match:class = ^(org.tsuza.mannager)
}

# windowrule = move 20 20, class:^(org.tsuza.mannager)

# Per-app fixes End #

